# Default synthes setup
sr: 16000

# Augment
reverb_level_range: [0.3, 0.7]
rir_prob: 0.1
snr_range: [5, 25]
noise_prob: 0.1

# Generation
dialog_type_probs: [0.1, 0.5, 0.4]
volume_type_probs: [0.5, 0.5]
normalization_var: 0.5
min_volume: 0.1
max_volume: 2.0
num_speakers: [2, 6]
turns_per_speaker: [2, 4]
max_pause: 1.5
overlap_range: [0.2, 0.8]
max_overlap: 1.5

# Data
speaker_data_path: "/path/to/speaker/audios"
noise_data_path: "path/to/noise/audios"
rir_data_path: "/path/to/rir/audios"
